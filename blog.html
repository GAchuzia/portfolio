<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – GAchuzia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="blog.html" class="nav-link">blog</a>
      <a href="index.html" class="nav-logo">GAchuzia</a>
      <a href="projects.html" class="nav-link">projects</a>
    </nav>
  </header>

  <main class="main">
    <section class="section">
      <ul id="blog-list" class="blog-list">
        <li class="blog-item blog-list-loading">Loading…</li>
      </ul>
    </section>
  </main>

  <p class="random-quote" id="random-quote" aria-live="polite"></p>
  <footer class="site-footer">
    <span class="footer-copy">© 2026 Grant Achuzia</span>
    <div class="footer-links">
      <a href="mailto:grant.achuzia@gmail.com" class="footer-link-email">Email</a>
      <a href="https://www.linkedin.com/in/grant-achuzia-8259251b8/" target="_blank" rel="noopener" class="footer-link-linkedin">LinkedIn</a>
      <a href="https://github.com/GAchuzia" target="_blank" rel="noopener" class="footer-link-github">Github</a>
      <a href="assets/Resume_GrantAchuzia.pdf" download class="footer-link-resume">Resume</a>
    </div>
  </footer>
  <script>
    (function () {
      var listEl = document.getElementById('blog-list');
      fetch('posts/index.json')
        .then(function (r) {
          if (!r.ok) throw new Error('Could not load posts');
          return r.json();
        })
        .then(function (posts) {
          listEl.innerHTML = '';
          if (posts.length === 0) {
            listEl.innerHTML = '<li class="blog-item">No posts yet.</li>';
            return;
          }
          posts.forEach(function (p) {
            var li = document.createElement('li');
            li.className = 'blog-item';
            li.innerHTML =
              '<time class="blog-date" datetime="' + p.date + '">' + p.date + '</time>' +
              '<div class="blog-content">' +
              '<h2 class="blog-title"><a href="blog/post.html?post=' + p.slug + '">' + escapeHtml(p.title) + '</a></h2>' +
              '<p class="blog-excerpt">' + escapeHtml(p.excerpt) + '</p>' +
              '</div>';
            listEl.appendChild(li);
          });
        })
        .catch(function () {
          listEl.innerHTML = '<li class="blog-item">Could not load posts. Run <code>node scripts/generate-posts-index.js</code> to build the index.</li>';
        });

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    })();
  </script>
  <script src="js/script.js"></script>
</body>
</html>
