<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog post – GAchuzia</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="../blog.html" class="nav-link">blog</a>
      <a href="../index.html" class="nav-logo">GAchuzia</a>
      <a href="../projects.html" class="nav-link">projects</a>
    </nav>
  </header>

  <main class="main">
    <article id="post-content" class="post-content">
      <p>Loading…</p>
    </article>
    <p class="back-link"><a href="../blog.html">← Back to blog</a></p>
  </main>

  <p class="random-quote" id="random-quote" aria-live="polite"></p>
  <footer class="site-footer">
    <span class="footer-copy">© 2026 Grant Achuzia</span>
    <div class="footer-links">
      <a href="mailto:grant.achuzia@gmail.com" class="footer-link-email">Email</a>
      <a href="https://www.linkedin.com/in/grant-achuzia-8259251b8/" target="_blank" rel="noopener" class="footer-link-linkedin">LinkedIn</a>
      <a href="https://github.com/GAchuzia" target="_blank" rel="noopener" class="footer-link-github">GitHub</a>
      <a href="../assets/Resume_GrantAchuzia.pdf" download class="footer-link-resume">Resume</a>
    </div>
  </footer>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');
      var el = document.getElementById('post-content');
      if (!slug) {
        el.innerHTML = '<p>No post specified.</p>';
        return;
      }
      var url = '../posts/' + slug + '.md';
      fetch(url)
        .then(function (r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function (md) {
          if (typeof marked !== 'undefined') {
            marked.setOptions({ gfm: true });
            el.innerHTML = marked.parse(md);
            el.classList.add('markdown-body');
          } else {
            el.textContent = md;
          }
        })
        .catch(function () {
          el.innerHTML = '<p>Post not found.</p>';
        });
    })();
  </script>
  <script src="../js/script.js"></script>
</body>
</html>
