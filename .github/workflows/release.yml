name: Auto Release Website

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # only run on semantic version tags

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Upload entire repo as a release asset
      - name: Zip repository
        run: zip -r portfolio-repository.zip .

      # 3) Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: portfolio-repository.zip

# git tag vX.X.X && git push origin vX.X.X